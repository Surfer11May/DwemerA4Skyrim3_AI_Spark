services:
  init-chmod:
    profiles: [Skyrim-Full-Stack]
    image: busybox
    command: chmod -R 777 /opt/nim/.cache /var/lib/milvus /data
    volumes: [nim-cache:/opt/nim/.cache, milvus-data:/var/lib/milvus, redis-data:/data]
    
  # --- LLM CORE STACK (NVFP4 Variant) ---
  llm-standard:
    profiles: [Skyrim-Full-Stack]
    image: nvcr.io/nvidia/vllm:26.02-py3 
    ports: ["8000:8000"]
    environment:
      - NGC_API_KEY=${NGC_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      # Required for vLLM to use the NVFP4 specialized kernels on Spark
      - VLLM_USE_FLASHINFER_MOE_FP4=1 
    volumes: 
      - "nim-cache:/root/.cache/huggingface"
    command: >
      vllm serve "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4"
      --host 0.0.0.0
      --port 8000
      --trust-remote-code
      --max-model-len 4096
      --gpu-memory-utilization 0.70
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, device_ids: ['0'], capabilities: [gpu]}]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 900s
    
  milvus:
    profiles: [Skyrim-Full-Stack]
    image: "milvusdb/milvus:v2.4.6"
    depends_on:
      init-chmod: {condition: service_completed_successfully}
    ports: ["19530:19530"]
    environment:
      - ETCD_USE_EMBED=true
      - COMMON_STORAGETYPE=local
    volumes: ["milvus-data:/var/lib/milvus"]
    command: "milvus run standalone"
    
  redis:
    profiles: [Skyrim-Full-Stack]
    image: "redis:7"
    depends_on:
      init-chmod: {condition: service_completed_successfully}
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
    
volumes:
  nim-cache:
  milvus-data:
  redis-data:
