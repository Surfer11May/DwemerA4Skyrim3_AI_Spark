  stt-whisper:
    image: ghcr.io/linuxserver/faster-whisper:arm64v8-latest
    container_name: agentic-rag-stt-whisper-1
    profiles:
      - Skyrim-Full-Stack
    environment:
      - WHISPER_MODEL=Numbat/faster-skyrim-whisper-base.en
      - WHISPER_LANG=en
      - PUID=911
      - PGID=911
      - TZ=America/Chicago
      # Keep these for generic settings
      - HF_HUB_OFFLINE=0
    volumes:
      - /home/surfer11may/dwemer/remote-faster-whisper/models:/app/models
    ports:
      - "8004:10300"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu] # Ensures Numbat uses the GB10 Tensor cores
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10300/"] 
      interval: 30s
      timeout: 20s
      retries: 20
      start_period: 600s
      
  tts-xtts:
    image: rajeshjsl3/xtts-api-server:working.29.10.2024
    container_name: agentic-rag-tts-xtts-1
    profiles:
      - Skyrim-Full-Stack
    environment:
      - COQUI_TOS_AGREED=1  # CRITICAL: Fixes the "silent hang" on startup
      - USE_GPU=true
    volumes:
      - /home/surfer11may/dwemer/xtts-api-server:/app/data
    ports:
      - "8020:8020"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu] # Reserves VRAM for the synthesis "Voice"
    depends_on:
      stt-whisper:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/docs"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
      
  minime-t5:
    image: dwemer/minime-t5:arm64 # <--- This matches your build
    container_name: agentic-rag-minime-t5-1
    profiles:
      - Skyrim-Full-Stack
    ports:
      - "8082:8003"
    volumes:
      - /home/surfer11may/dwemer/minime-t5:/app/models
    depends_on:
      tts-xtts:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
              
  milvus:
    profiles:
      - Skyrim-Full-Stack
    image: "milvusdb/milvus:v2.4.6"
    depends_on:
      init-chmod:
        condition: service_completed_successfully
    ports: ["19530:19530"]
    environment:
      - ETCD_USE_EMBED=true
      - COMMON_STORAGETYPE=local
    volumes: ["milvus-data:/var/lib/milvus"]
    command: "milvus run standalone"
    
  redis:
    profiles:
      - Skyrim-Full-Stack
    image: "redis:7"
    depends_on:
      init-chmod:
        condition: service_completed_successfully
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
    
volumes:
  nim-cache:
  milvus-data:
  redis-data:
