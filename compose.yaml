services:
  init-chmod:
    profiles: [Skyrim-Full-Stack]
    image: busybox
    command: chmod -R 777 /opt/nim/.cache /var/lib/milvus /data
    volumes: [nim-cache:/opt/nim/.cache, milvus-data:/var/lib/milvus, redis-data:/data]
    
  # --- LLM CORE STACK (The Brain) ---
  llm-standard:
    profiles: [Skyrim-Full-Stack]
    image: nvcr.io/nvidia/vllm:26.02-py3
    shm_size: '16gb'
    ports: ["8000:8000"]
    environment:
      - NGC_API_KEY=${NGC_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/opt/nim/.cache
      - PYTHONUNBUFFERED=1
      - NIM_MAX_MODEL_LEN=8192
    volumes:
      - "nim-cache:/opt/nim/.cache"
    command: >
      vllm serve "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4"
      --host 0.0.0.0
      --port 8000
      --trust-remote-code
      --max-model-len 8192
      --gpu-memory-utilization 0.35
      --disable-log-requests
      --swap-space 4
      --max-num-seqs 16
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, device_ids: ['0'], capabilities: [gpu]}]
      restart_policy:
        condition: on-failure
    depends_on:
      init-chmod: {condition: service_completed_successfully}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 20s
      retries: 60
      start_period: 900s
      
  llm-vision:
    profiles: [Skyrim-Full-Stack]
    image: nvcr.io/nvidia/vllm:26.01-py3
    shm_size: '16gb'
    ports: ["8002:8000"]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - NIM_MAX_MODEL_LEN=4096    
    volumes: ["nim-cache:/root/.cache/huggingface"]
    command: >
      vllm serve "nvidia/Qwen2.5-VL-7B-Instruct-NVFP4"
      --host 0.0.0.0 --port 8000 --trust-remote-code
      --max-model-len 4096 --gpu-memory-utilization 0.15
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, device_ids: ['0'], capabilities: [gpu]}]
    depends_on:
      llm-standard: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 900s

  llm-diary:
    profiles: [Skyrim-Full-Stack]
    image: nvcr.io/nvidia/vllm:26.01-py3
    shm_size: '16gb'
    ports: ["8005:8000"]  # Changed host port to 8005 to clear 8003 for MiniMe
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - NIM_MAX_MODEL_LEN=4096
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, device_ids: ['0'], capabilities: [gpu]}]
    command: >
      vllm serve "nvidia/Llama-3.1-8B-Instruct-NVFP4" --host 0.0.0.0 --port 8000 --trust-remote-code --max-model-len 4096 --gpu-memory-utilization 0.12
    depends_on:
      llm-vision: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 30s
      retries: 15
      start_period: 500s

  stt-whisper:
    profiles: [Skyrim-Full-Stack]
    image: ghcr.io/linuxserver/faster-whisper:arm64v8-latest
    environment:
      - WHISPER_MODEL=Numbat/faster-skyrim-whisper-base.en
      - WHISPER_COMPUTE_TYPE=float16 
      - WHISPER_LANG=en
      - HF_TOKEN=${HF_TOKEN}  # Prevents the "Unauthenticated" warning
      - LD_LIBRARY_PATH=/usr/local/cuda/lib64  # Forces the container to find the GPU libs
    volumes:
      - /home/surfer11may/dwemer/remote-faster-whisper/models:/config/models
    ports:
      - "10300:10300"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
      restart_policy:
        condition: on-failure
    depends_on:
      llm-diary:
        condition: service_healthy
    healthcheck:
      # Using 'nc' (netcat) is the most reliable way to check the socket status
      test: ["CMD-SHELL", "nc -z localhost 10300 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 300s

  tts-xtts:
    profiles: [Skyrim-Full-Stack]
    image: rajeshjsl3/xtts-api-server:working.29.10.2024
    container_name: agentic-rag-tts-xtts-1
    environment:
      - COQUI_TOS_AGREED=1
      - USE_GPU=true
    volumes:
      - /home/surfer11may/dwemer/xtts-api-server:/app/data
    ports: ["8020:8020"]
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, device_ids: ['0'], capabilities: [gpu]}]
    depends_on:
      stt-whisper: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8020'"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 300s

  minime-t5:
    profiles: [Skyrim-Full-Stack]
    build:
      context: /home/surfer11may/dwemer/minime-t5
      dockerfile: Dockerfile
    image: dwemer/minime-t5:arm64
    container_name: agentic-rag-minime-t5-1
    ports: ["8003:8003"] # Now uses 8003 cleanly since Diary moved to 8005
    volumes:
      - /home/surfer11may/dwemer/minime-t5:/app/models
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, device_ids: ['0'], capabilities: [gpu]}]
    depends_on:
      tts-xtts: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8003'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 200s
      
  # --- DATA STACK ---
  milvus:
    profiles: [Skyrim-Full-Stack]
    image: "milvusdb/milvus:v2.4.6"
    depends_on:
      init-chmod: {condition: service_completed_successfully}
      llm-standard: {condition: service_healthy}
    ports: ["19530:19530"]
    environment:
      - ETCD_USE_EMBED=true
      - COMMON_STORAGETYPE=local
    volumes: ["milvus-data:/var/lib/milvus"]
    command: "milvus run standalone"
    
  redis:
    profiles: [Skyrim-Full-Stack]
    image: "redis:7"
    depends_on:
      init-chmod: {condition: service_completed_successfully}
      llm-standard: {condition: service_healthy}
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
    
volumes:
  nim-cache:
  milvus-data:
  redis-data:
