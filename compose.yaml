services:
  init-whisper:
    profiles: ["Skyrim-Full-Stack"]
    image: busybox
    # This command creates the folder and sets broad permissions automatically
    command: sh -c "mkdir -p /whisper_models/hub && chmod -R 777 /whisper_models"
    volumes:
      - /home/surfer11may/dwemer/whisper_models:/whisper_models
    user: root # Runs as root to ensure it has permission to create folders on the SSD

  init-chmod:
    profiles: [Skyrim-Full-Stack]
    image: busybox
    command: chmod -R 777 /opt/nim/.cache /var/lib/milvus /data
    volumes: [nim-cache:/opt/nim/.cache, milvus-data:/var/lib/milvus, redis-data:/data]

  stt-whisper:
    profiles: [Skyrim-Full-Stack]
    image: fedirz/faster-whisper-server:latest-cuda
    # Standard bridge mode (default, so no network_mode line needed)
    environment:
      - WHISPER__MODEL=Numbat/faster-skyrim-whisper-base.en
      - WHISPER__COMPUTE_TYPE=float16
      - WHISPER__INFERENCE_DEVICE=cuda
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - /home/surfer11may/dwemer/whisper_models:/root/.cache/huggingface
    ports:
      - "10300:8000"  # External port 10300 : Internal port 8000
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, device_ids: ['0'], capabilities: [gpu]}]
    depends_on:
      init-whisper: {condition: service_completed_successfully}
      init-chmod: {condition: service_completed_successfully}
    healthcheck:
      # We check 8000 here because the container sees itself on its internal port
      test: ["CMD-SHELL", "python3 -c 'import socket; s = socket.socket(); s.connect((\"localhost\", 8000))'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 200s

  tts-xtts:
    profiles: [Skyrim-Full-Stack]
    image: rajeshjsl3/xtts-api-server:working.29.10.2024
    container_name: agentic-rag-tts-xtts-1
    environment:
      - COQUI_TOS_AGREED=1
      - USE_GPU=true
    volumes:
      - /home/surfer11may/dwemer/xtts-api-server:/app/data
    ports: ["8020:8020"]
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, device_ids: ['0'], capabilities: [gpu]}]
    depends_on:
      stt-whisper: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8020'"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 300s

  # --- DATA STACK ---
  milvus:
    profiles: [Skyrim-Full-Stack]
    image: "milvusdb/milvus:v2.4.6"
    depends_on:
      init-chmod: {condition: service_completed_successfully}
    ports: ["19530:19530"]
    environment:
      - ETCD_USE_EMBED=true
      - COMMON_STORAGETYPE=local
    volumes: ["milvus-data:/var/lib/milvus"]
    command: "milvus run standalone"

  redis:
    profiles: [Skyrim-Full-Stack]
    image: "redis:7"
    depends_on:
      init-chmod: {condition: service_completed_successfully}
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]

volumes:
  nim-cache:
  milvus-data:
  redis-data: